<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .box {
      height: 100px;
      width: 100px;
      background-color: #333;
      border: 3px solid rgb(141, 171, 23);
    }
    .active {
      background: red;
    }
  </style>
  <body>
    <div class="expDom">
      <!-- Bài 1 -->
      <h1 id="title">Hello</h1>
      <button class="btn-changeText">Change</button>

      <!-- Bài 2 -->
      <p class="text">Hello DOM</p>
      <button class="btn-changeColor">Red</button>

      <!-- Bài 3 -->
      <div class="box"></div>
      <button class="toggle">Toggle</button>

      <!-- Bài 4 -->
      <input id="name" />
      <button class="btn-show">Show</button>
      <p id="input-value"></p>

      <!-- Bai 5 -->
      <input class="passWord" type="password" />
      <button class="btn-ShowPassWord">Show</button>

      <!-- Bai 6 -->
      <h1 id="num">0</h1>
      <button id="btn-increase">+</button>
      <button id="btn-decrease">-</button>
      <button id="btn-reset">Reset</button>

      <!-- Bài 7 -->
      <div id="list">
          <h1>TO DO LIST </h1>
          <input type="text" class="inputTask">
          <button class="btn-addTask">Add task</button>
          <!--  -->
          <div class="resultList">

          </div>
      </div>

      <!-- Bài 8 -->
       <div class="searchFilter">
          <h1>Search Filter </h1>
        <input type="text" id="inputText">
        <ul class="resultSearchFilter">Result: </ul>
       </div>
      <!--  -->
      <!--  -->
      <!--  -->
    </div>
  </body>
  <script src="expDom.js"></script>
</html>
