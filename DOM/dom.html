<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{margin: 0; padding: 0; box-sizing: border-box;}
    body{
        background: #444;
        color: white;
    }
    .list{
        background-color: brown;
        text-align: center;
    }
    .list .element{
        padding: 10px;
    }
    .list .element:hover {
        background-color: #666;
        cursor: pointer;
    }

    .list-query{
        background-color: yellow;
        text-align: center;
    }
    .list-query .item{
        color: #222;
        padding: 10px 0px;
    }
    .list-query .item:hover{
        background-color: brown;
        cursor: pointer;
    }
</style>
<body>
    <!--  -->
    <div class="list">
        <p class="element">Quyền Vương</p>
        <p id="lol" class="element">Liên Minh Huyền Thoại</p>
        <p class="element">GTA 5</p>
        <p class="element">Project Zomeboid</p>
        <p class="element">Cờ tướng</p>
        <p class="element">
            Hello 
            <span>Truong Tuan Dung</span>
            <span style="display: none;">Dep Trai</span>
            !!!
        </p>
    </div>
    <hr>
    <div class="list-query">
        <p class="item">Ngủ</p>
        <p class="item">Code</p>
        <p class="item">Gym</p>
        <p class="item">Ăn</p>
        <p class="item">Gia đình</p>
        <p class="item">
            <span style="Color: green; font-size: 25px;">Chịch</span>
        </p>
    </div>


</body>
<script src="dom.js"></script>
</html>
