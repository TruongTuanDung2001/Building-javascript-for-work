<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #444;
      color: white;
      font-size: 20px;
      height: 200vh;
    }
    a,
    ul,
    li {
      /* text-decoration: none; */
      list-style: none;
      color: aqua;
    }
    .list {
      background-color: brown;
      text-align: center;
    }
    .list .element {
      padding: 10px;
    }
    .list .element:hover {
      background-color: #666;
      cursor: pointer;
    }

    .list-query {
      background-color: yellow;
      text-align: center;
    }
    .list-query .item {
      color: #222;
      padding: 10px 0px;
    }
    .list-query .item:hover {
      background-color: brown;
      cursor: pointer;
    }

    /*  */
    .image {
      height: 300px;
      /* width: 300px; */
    }
    input {
      padding: 5px;
      font-size: 20px;
      margin: 10px;
    }

    /* CLASSLIST */
    .classList {
      text-align: center;
      background: #000;
    }
    .classList .item-class {
      font-size: 20px;
      /* background: red; */
      padding: 10px;
    }
    .classList .btn-classAdd,
    .classList .btn-classRemove,
    .classList .btn-classToggle {
      font-size: 20px;
      padding: 10px;
    }
    .bg-red {
      background: red;
    }

    .change-element{
     background: brown;
     border: 3px solid #fff
    }
  </style>
  <body>
    <!--  -->
    <div class="list">
      <p class="element">Quyền Vương</p>
      <p id="lol" class="element">Liên Minh Huyền Thoại</p>
      <p class="element">GTA 5</p>
      <p class="element">Project Zomeboid</p>
      <p class="element">Cờ tướng</p>
      <p class="element">
        Hello
        <span>Truong Tuan Dung</span>
        <span style="display: none">Dep Trai</span>
        !!!
      </p>
    </div>
    <hr />
    <div class="list-query">
      <p class="item">Ngủ</p>
      <p class="item">Code</p>
      <p class="item">Gym</p>
      <p class="item">Ăn</p>
      <p class="item">Gia đình</p>
      <p class="item">
        <span style="color: green; font-size: 25px">Chịch</span>
      </p>
    </div>

    <!-- Change properties -->
    <div class="change-properties">
      <!-- img -->
      <div class="img">
        <img src="./img/2.jpg" alt="" class="image" />
        <img src="./img/2.jpg" alt="" class="image" />
      </div>
      <!-- link -->
      <div class="link">
        <a class="w3school" href="https://www.w3schools.com/">W3schools</a>
      </div>
      <!-- input -->
      <input
        type="text"
        class="input"
        value="Nguyen Van A"
        placeholder="Enter yours name"
      />
    </div>

    <!-- Classlist -->
    <div class="classList">
      <div class="item-class">Hãy sửa đổi em đi !!!</div>
      <button class="btn-classAdd">Add</button>
      <button class="btn-classRemove">Remove</button>
      <button class="btn-classToggle">Toggle</button>
    </div>

    <!-- Create / remove element
      createElement()
      appendChild()
      append()
      prepend()
      remove() 
     -->
    <div class="change-element">
      <h1>Element</h1>
    </div>

  </body>
  <script src="dom.js"></script>
</html>
