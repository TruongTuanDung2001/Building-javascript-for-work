<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background: #000;
        color: #fff;
        font-size: 25px;
        text-align: center;
    }
    button, input{
        font-size: 25px;
        padding: 6px;
    }
</style>
<body>
    <!-- DOM EVENT JAVASCRIPT -->
     <div class="domEvent">
        <!-- Click event -->
        <button id="btn-clickEvent">Click</button>

        <!-- Input event -->
         <br>
         <input type="text" id="input-Event">

         <!-- Submit event -->
         <br>
         <form action="" id="form-submit">
            <input type="text" class="input-submit">
            <button type="submit" id="btn-submit">Submit</button>
         </form>

         <!-- Bubbling: Sủi bọt -->
         <div class="box" id="parent">
            <button id="child">Child</button>
         </div>

     </div>
</body>
<script src="event.js"></script>
</html>
